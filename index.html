<!DOCTYPE html>
<html>
<head>
    <title>For You ❤️</title>
</head>
<body style="text-align:center; font-family:sans-serif; margin-top:100px;">

    <h1>Will you be my girlfriend? ❤️</h1>

    <button onclick="yes()">Yes</button>
    <button onclick="no()">No</button>

    <script>
        function yes() {
            document.body.innerHTML = "<h1>Yay! I love you ❤️</h1>";
        }

        function no() {
            alert("Try again 😆");
        }
    </script>

</body>
</html>
